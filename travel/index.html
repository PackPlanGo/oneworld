<form id="guide-form">
  <input type="email" id="guide-email" name="fields[email]" placeholder="Deine E-Mail-Adresse" required>
  <label>
    <input type="checkbox" id="guide-consent" name="consent" required>
    Ich stimme zu, E-Mails mit Tipps, Guides und Updates zu erhalten.
  </label>
  <input type="hidden" name="ml-submit" value="1">
  <input type="hidden" name="anticsrf" value="true">
  <button type="submit">📥 Guide kostenlos herunterladen</button>
</form>

<div id="guide-success" style="display:none; margin-top:20px; text-align:center;">
  <h3>Danke :)</h3>
  <p>Deine Bestätigungsmail ist auf dem Weg zu dir.<br>
  Bitte öffne sie und klicke auf den Bestätigungslink, um deinen Guide zu erhalten.<br>
  <small>Check vorsichtshalber auch den Spam-Ordner.</small></p>
</div>

<script>
document.getElementById('guide-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('guide-email').value;
  const body = 'fields[email]=' + encodeURIComponent(email) + '&ml-submit=1&anticsrf=true';

  fetch('https://assets.mailerlite.com/jsonp/2373720/forms/188256722595349681/subscribe', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body
  })
  .then(function() {
    document.getElementById('guide-form').style.display = 'none';
    document.getElementById('guide-success').style.display = 'block';
  })
  .catch(function() {
    document.getElementById('guide-form').style.display = 'none';
    document.getElementById('guide-success').style.display = 'block';
  });
});
</script>
