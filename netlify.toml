[build]
  publish = "."

# Saubere URLs (kein .html in der Adresse)
[[redirects]]
  from = "/travel"
  to = "/travel/index.html"
  status = 200

[[redirects]]
  from = "/studio"
  to = "/studio/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/boutique-hotels-social-media-learnings"
  to = "/blog/boutique-hotels-social-media-learnings/index.html"
  status = 200


[[redirects]]
  from = "/passion-finden-durch-reisen"
  to = "/blog/passion-finden-durch-reisen/index.html"
  status = 200

[[redirects]]
  from = "/reisen-produktivitaet"
  to = "/blog/reisen-produktivitaet/index.html"
  status = 200

[[redirects]]
  from = "/routine-auf-reisen"
  to = "/blog/routine-auf-reisen/index.html"
  status = 200


# Sicherheits-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
