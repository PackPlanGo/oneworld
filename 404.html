<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lost? · PackPlanGo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f3efe7;--dark:#0f3d36;--dark-2:#0a2a25;--accent:#e89a5b;--muted:#5a6661}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
header{padding:24px 32px;border-bottom:1px solid rgba(15,61,54,.08)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--dark)}
.logo span{color:var(--accent)}
main{flex:1;display:grid;place-items:center;padding:60px 32px;text-align:center}
.card{max-width:620px}
.code{font-family:'Playfair Display',serif;font-size:clamp(110px,18vw,200px);color:var(--accent);line-height:1;font-style:italic;font-weight:500;letter-spacing:-.04em}
.eyebrow{font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);font-weight:500;margin:12px 0 18px}
h1{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(34px,4.5vw,52px);color:var(--dark);line-height:1.15;margin-bottom:20px}
p.lead{font-size:18px;color:var(--muted);line-height:1.65;max-width:480px;margin:0 auto 36px}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{padding:15px 28px;border-radius:999px;font-weight:500;font-size:15px;transition:transform .2s,background .2s,color .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#d9874a;transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--dark);border:1.5px solid var(--dark)}
.btn-outline:hover{background:var(--dark);color:#fff}
footer{padding:30px;text-align:center;font-size:13px;background:var(--dark-2);color:rgba(255,255,255,.55)}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">PackPlanGo<span>.</span></a>
</header>

<main>
  <div class="card">
    <div class="code">404</div>
    <p class="eyebrow">Off the map</p>
    <h1>Diese Route gibt's<br>nicht im Guide.</h1>
    <p class="lead">
      Sieht so aus, als hättest du dich verlaufen. Kein Stress , 
      passiert den Besten. Hier geht's zurück zur Hauptkarte.
    </p>
    <div class="btns">
      <a href="/" class="btn btn-primary">Zurück nach Hause</a>
      <a href="/travel/" class="btn btn-outline">Zu PackPlanGo Travel</a>
    </div>
  </div>
</main>

<footer>© 2026 PackPlanGo, Travel. Plan. Go.</footer>

</body>
</html>
